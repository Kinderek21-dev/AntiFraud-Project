version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: antifraud
    ports:
      - "5433:5432" 
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      
  app:
    build: .
    environment:
      - DB_HOST=db
    depends_on:
      - db

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - db